spring:
  application:
    name: help-desk-backend

  ##SpringAI-MySQL DB Props
  datasource:
    url: jdbc:mysql://localhost:3306/spring_ai
    username: root
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  ##SpringAI-OpenAI props
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4.1-nano
#      temperature: 0.2
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
server:
  port: 8081

logging:
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: DEBUG

