spring:
  application:
    name: spring-ai

##SpringAI-OpenAI props
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
#      chat:
#        options:
#          model: gpt-4.1-nano
#      temperature: 0.2
#    chat:
#      client:
#        enabled: false
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always


##SpringAI-MySQL DB Props
  datasource:
    url: jdbc:mysql://localhost:3306/spring_ai?createDatabaseIfNotExist=true
    username: root
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver





server:
  port: 8081


##Logging
logging:
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: DEBUG





